# CI — Compuerta de integración (PR Checks) del backend.
# Laboratorio Dual S11: "Gobernanza del Cambio — PR Checks y Aprobaciones".
# Implementa los checks objetivos que la máquina verifica ANTES de la revisión
# humana (slide 10): Compilación (build), Linter, Unit Tests y Cobertura, más
# una validación de política de Conventional Commits (commitlint).
name: CI

on:
  pull_request:
    branches: [main, testeo1, develop]
  push:
    branches: [main, testeo1, develop, 'feature/**', 'fix/**', 'hotfix/**']

# Cancela ejecuciones antiguas del mismo PR/rama para ahorrar minutos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Husky no debe instalar git hooks en CI (evita que `prepare` rompa `npm ci`).
env:
  HUSKY: '0'

jobs:
  # ── Compilación: las dependencias (incl. binarios nativos como argon2)
  #    resuelven e instalan correctamente. Equivale al "build" de un backend Node.
  build:
    name: Compilación (npm ci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Verificación de sintaxis del entrypoint
        run: node --check api.js

  # ── Linter: estilo y errores estáticos (ESLint).
  lint:
    name: Linter (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - run: npm run lint

  # ── Unit Tests + Cobertura: suite Vitest con reporte de cobertura
  #    (dominio + aplicación; la infraestructura se excluye — ADR-0003).
  test:
    name: Unit Tests + Cobertura (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Ejecutar pruebas con cobertura
        run: npm run test:ci
      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage/
          retention-days: 7

  # ── Quality Gate (Fase 3): la cobertura de la lógica de negocio (núcleo de
  #    dominio) debe ser ≥ 80 % de líneas; si baja, el pipeline FALLA y bloquea
  #    el merge. Umbral en vitest.coverage.config.js.
  quality-gate:
    name: Quality Gate (cobertura ≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Quality gate de cobertura (falla si <80%)
        run: npm run test:cov

  # ── Política SCM: los mensajes de commit del PR cumplen Conventional Commits.
  #    Solo aplica en pull_request (compara la base con el head del PR).
  commitlint:
    name: Política de commits (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Validar mensajes de commit del PR
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  # ── Status Accounting (Fase 5 + Desafío #4): tras un merge exitoso a la rama
  #    principal, registra los metadatos del cambio (scm-status-report.json) y
  #    publica un log anotado en el historial de Releases. Solo corre si los
  #    checks de calidad pasaron.
  status-accounting:
    name: Status Accounting (registro de estado)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/testeo1' || github.ref == 'refs/heads/main')
    needs: [build, lint, test, quality-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generar reporte de contabilidad de estado
        run: node scripts/scm-status-report.mjs
        env:
          SCM_CI_STATUS: passed
      - name: Publicar reporte como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: scm-status-report
          path: scm-status-report.json
          retention-days: 30
      - name: Publicar log anotado en el historial de releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="scm-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Status Accounting — $TAG" \
            --notes-file scm-status-report.json \
            --target "${{ github.sha }}" || echo "release $TAG ya existe"

  # ── Fase GitOps: Construye la imagen Docker, la sube y actualiza el manifiesto
  #    Cumple con el estándar de despliegue automático del laboratorio.
  gitops-delivery:
    name: Delivery GitOps (Docker + Update Manifest)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, lint, test, quality-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código de la aplicación
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen Docker (SemVer)
        env:
          # REEMPLAZA ESTO por tu usuario real de Docker Hub y nombre de app
          IMAGE_NAME: edstone05/hc-backend
          # Genera una versión tipo v1.1.X usando el número de ejecución de GitHub
          TAG: v1.1.${{ github.run_number }}
        run: |
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG
          echo "NEW_TAG=$TAG" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Checkout del Repositorio GitOps
        uses: actions/checkout@v4
        with:
          repository: Edstone5/hc-gitops-config
          # Se necesita un token personal para escribir en otro repositorio
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Actualizar tag de la imagen en el GitOps Repo
        run: |
          cd gitops-repo/k8s/desarrollo

          # Actualiza la línea de la imagen en tu archivo deployment
          sed -i "s|image: .*|image: ${{ env.IMAGE }}:${{ env.NEW_TAG }}|g" 03-deployment.yaml

          # Configurar usuario bot para el commit
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Hacer commit y push en el repositorio de configuración
          git add 03-deployment.yaml
          git commit -m "ci: actualiza imagen a ${{ env.NEW_TAG }} (GitOps)"
          git push origin main
